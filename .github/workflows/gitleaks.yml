name: Scan secrets (gitleaks)

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

permissions:
  contents: read
  # Nécessaire pour poster des annotations sur les PRs
  security-events: write

jobs:
  gitleaks:
    name: Détection de secrets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Récupère tout l'historique pour scanner tous les commits du push
          fetch-depth: 0

      - name: Scan gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Optionnel : clé gitleaks pour les rapports avancés (tier payant)
          # GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
        with:
          # Utilise notre config personnalisée
          config-path: .gitleaks.toml
