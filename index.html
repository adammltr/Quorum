<!doctype html>
<html lang="fr" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="dark light" />
    <meta
      name="description"
      content="Quorum — posez une question, regardez 4 intelligences délibérer."
    />

    <!-- Couleur de la barre système, accordée au thème (sombre par défaut) -->
    <meta name="theme-color" content="#080504" media="(prefers-color-scheme: dark)" />
    <meta name="theme-color" content="#f8f4f1" media="(prefers-color-scheme: light)" />

    <!-- PWA + iOS -->
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <meta name="apple-mobile-web-app-title" content="Quorum" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- Open Graph / Twitter (les pages partagées /q/:slug surchargent via api/share.ts) -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Quorum" />
    <meta property="og:title" content="Quorum — Le consensus des intelligences" />
    <meta
      property="og:description"
      content="Posez une question, regardez 4 intelligences délibérer, obtenez un verdict de consensus."
    />
    <meta property="og:image" content="/api/og" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Quorum — Le consensus des intelligences" />
    <meta
      name="twitter:description"
      content="Posez une question, regardez 4 intelligences délibérer, obtenez un verdict de consensus."
    />
    <meta name="twitter:image" content="/api/og" />

    <!-- Préchargement des polices critiques (above-the-fold) -->
    <link
      rel="preload"
      href="/fonts/instrument-serif-latin-400-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/geist-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/geist-mono-latin-wght-normal.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />

    <title>Quorum — Le consensus des intelligences</title>

    <!-- Anti-FOUC : applique le thème persisté avant le 1er paint (défaut sombre) -->
    <script>
      (function () {
        try {
          var t = localStorage.getItem('quorum-theme')
          var theme = t === 'light' || t === 'dark' ? t : 'dark'
          var root = document.documentElement
          root.classList.remove('dark', 'light')
          root.classList.add(theme)
        } catch (e) {
          /* localStorage indisponible → on garde la classe `dark` du <html> */
        }
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
